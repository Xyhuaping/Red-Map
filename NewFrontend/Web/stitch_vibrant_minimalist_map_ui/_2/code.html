<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .vibrant-gradient {
            background: linear-gradient(135deg, #0070eb 0%, #60cdff 100%);
        }
        .soft-glow-blue {
            box-shadow: 0 4px 20px rgba(0, 88, 188, 0.15);
        }
        .chart-bar-active {
            background: linear-gradient(to top, #0058bc, #60cdff);
        }
        .chart-bar-inactive {
            background: #ededf2;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface font-body-lg text-on-surface min-h-screen pb-32">
<!-- TopAppBar -->
<header class="flex justify-between items-center px-4 py-3 w-full z-50 fixed top-4 inset-x-4 rounded-2xl bg-white/70 dark:bg-slate-900/70 backdrop-blur-xl border border-white/20 dark:border-slate-800/50 shadow-[0_8px_32px_rgba(0,0,0,0.08)]">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-blue-600 dark:text-blue-400" data-icon="location_on">location_on</span>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold text-base tracking-tight text-on-surface">北京市</h1>
</div>
<div class="flex items-center gap-3">
<button class="p-2 rounded-full hover:bg-white/40 dark:hover:bg-slate-800/40 transition-colors active:scale-95 duration-300">
<span class="material-symbols-outlined text-slate-500" data-icon="notifications">notifications</span>
</button>
<div class="w-8 h-8 rounded-full overflow-hidden border-2 border-primary-container">
<img class="w-full h-full object-cover" data-alt="professional male portrait with friendly expression and clean studio lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBYK1bKPoMj5ByW9Fyv43vQC8m3W-8ZZe9o7U8T15sIxSOUSJj85Zy_dOE9HX2nS733DTyC6qk3eB3f3gfpcFgfQSB-hgDRQiLz5ipeUvztCoM38agffuilRoJjebmqj1JOwW-1MTa7huptjEMFhSw0EshtZREb7tJ4J4ZBbyzew1iWYsBQkekPRuwkG18NRwIcx2XspBhlLyIC5zmzeavPhteyLfVk_HV6fLDD3b3PDR-YefJ6k55Buk7xDCgaK_UdxW0Ym_KRKQ"/>
</div>
</div>
</header>
<main class="px-container-margin pt-28 space-y-lg">
<!-- Header Section -->
<section class="space-y-xs">
<h2 class="font-display-lg text-display-lg text-on-surface">活动统计</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant">查看您在北京市的探索历程</p>
</section>
<!-- High-level Stats Bento Grid -->
<section class="grid grid-cols-2 gap-gutter">
<div class="glass-card p-md rounded-xl soft-glow-blue space-y-xs">
<div class="flex items-center justify-between">
<span class="material-symbols-outlined text-primary" data-icon="route">route</span>
<span class="font-label-caps text-label-caps text-primary bg-primary-fixed px-2 py-0.5 rounded-full">+12%</span>
</div>
<div>
<p class="font-label-caps text-label-caps text-on-surface-variant">总里程 (KM)</p>
<p class="font-headline-md text-headline-md">124.5</p>
</div>
</div>
<div class="glass-card p-md rounded-xl soft-glow-blue space-y-xs">
<div class="flex items-center justify-between">
<span class="material-symbols-outlined text-tertiary" data-icon="map">map</span>
<span class="font-label-caps text-label-caps text-tertiary bg-tertiary-fixed px-2 py-0.5 rounded-full">New</span>
</div>
<div>
<p class="font-label-caps text-label-caps text-on-surface-variant">探索区域</p>
<p class="font-headline-md text-headline-md">18</p>
</div>
</div>
</section>
<!-- Activity Chart Card -->
<section class="glass-card p-lg rounded-xl soft-glow-blue space-y-lg">
<div class="flex justify-between items-end">
<div class="space-y-1">
<h3 class="font-headline-md text-headline-md">周活跃度</h3>
<p class="font-body-sm text-body-sm text-on-surface-variant">本周行走步数趋势</p>
</div>
<div class="flex gap-2">
<button class="px-3 py-1 bg-primary text-white rounded-full font-label-caps text-label-caps">周</button>
<button class="px-3 py-1 bg-surface-container text-on-surface-variant rounded-full font-label-caps text-label-caps">月</button>
</div>
</div>
<!-- Custom Bar Chart -->
<div class="flex items-end justify-between h-48 px-2">
<div class="flex flex-col items-center gap-2 group">
<div class="w-8 h-24 chart-bar-inactive rounded-t-full transition-all group-hover:chart-bar-active"></div>
<span class="font-label-caps text-[10px] text-on-surface-variant">Mon</span>
</div>
<div class="flex flex-col items-center gap-2 group">
<div class="w-8 h-32 chart-bar-inactive rounded-t-full transition-all group-hover:chart-bar-active"></div>
<span class="font-label-caps text-[10px] text-on-surface-variant">Tue</span>
</div>
<div class="flex flex-col items-center gap-2 group">
<div class="w-8 h-16 chart-bar-inactive rounded-t-full transition-all group-hover:chart-bar-active"></div>
<span class="font-label-caps text-[10px] text-on-surface-variant">Wed</span>
</div>
<div class="flex flex-col items-center gap-2 group">
<div class="w-8 h-40 chart-bar-active rounded-t-full shadow-lg"></div>
<span class="font-label-caps text-[10px] text-primary font-bold">Thu</span>
</div>
<div class="flex flex-col items-center gap-2 group">
<div class="w-8 h-28 chart-bar-inactive rounded-t-full transition-all group-hover:chart-bar-active"></div>
<span class="font-label-caps text-[10px] text-on-surface-variant">Fri</span>
</div>
<div class="flex flex-col items-center gap-2 group">
<div class="w-8 h-36 chart-bar-inactive rounded-t-full transition-all group-hover:chart-bar-active"></div>
<span class="font-label-caps text-[10px] text-on-surface-variant">Sat</span>
</div>
<div class="flex flex-col items-center gap-2 group">
<div class="w-8 h-20 chart-bar-inactive rounded-t-full transition-all group-hover:chart-bar-active"></div>
<span class="font-label-caps text-[10px] text-on-surface-variant">Sun</span>
</div>
</div>
</section>
<!-- Regional Hotspots -->
<section class="space-y-md">
<div class="flex justify-between items-center">
<h3 class="font-headline-md text-headline-md">热门探索区域</h3>
<button class="text-primary font-label-caps text-label-caps">全部</button>
</div>
<div class="space-y-gutter">
<div class="flex items-center gap-md bg-white p-md rounded-xl shadow-sm border border-surface-variant">
<div class="w-12 h-12 rounded-lg bg-primary-fixed flex items-center justify-center">
<span class="material-symbols-outlined text-primary" data-icon="park">park</span>
</div>
<div class="flex-1">
<p class="font-body-lg font-bold">朝阳公园</p>
<p class="font-body-sm text-on-surface-variant">访问 12 次 · 上周</p>
</div>
<div class="text-right">
<p class="font-label-caps text-primary font-bold">4.2km</p>
</div>
</div>
<div class="flex items-center gap-md bg-white p-md rounded-xl shadow-sm border border-surface-variant">
<div class="w-12 h-12 rounded-lg bg-secondary-fixed flex items-center justify-center">
<span class="material-symbols-outlined text-secondary" data-icon="museum">museum</span>
</div>
<div class="flex-1">
<p class="font-body-lg font-bold">故宫博物院</p>
<p class="font-body-sm text-on-surface-variant">访问 3 次 · 昨天</p>
</div>
<div class="text-right">
<p class="font-label-caps text-secondary font-bold">8.5km</p>
</div>
</div>
</div>
</section>
<!-- Map Mini-View -->
<section class="relative h-48 rounded-2xl overflow-hidden shadow-lg">
<img class="w-full h-full object-cover" data-alt="minimalist stylized map background of a city grid with soft blue and grey colors" data-location="Beijing" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAtXCdTC4xMgZZkJMEVI-bgUIfeMTljb4wAsEoCzLqtpB0XSlx5PPNCoU1Mt9onL9-5ltRnLn2iIzS1gtc7en4neJ5ZZeaDnJFDnrcvtKnc9q8caIR0syFfvPIwgJN2tDlT1nNPBlGAaDv3xiSKCiymR1mp0is_L6S6T_SXxqBWZhaJYV1dk6d6kv2R1LbobNM5a_JaPF9tWtzu1nXYWk-V2aJjbsGDtlBE5QdellwHGt-gTvbQNQugJzRsYG3SmivAsOcSthK1vA"/>
<div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent flex items-end p-lg">
<div class="flex items-center justify-between w-full text-white">
<div class="flex items-center gap-2">
<div class="w-3 h-3 bg-primary rounded-full animate-pulse shadow-[0_0_10px_rgba(0,88,188,0.8)]"></div>
<p class="font-label-caps">实时热力分布</p>
</div>
<span class="material-symbols-outlined" data-icon="open_in_full">open_in_full</span>
</div>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[calc(100%-48px)] max-w-md z-50 flex justify-around items-center px-6 py-3 bg-white/80 dark:bg-slate-950/80 backdrop-blur-2xl rounded-[28px] border border-white/30 dark:border-slate-800/30 shadow-[0_20px_50px_rgba(0,122,255,0.15)]">
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 opacity-80 hover:opacity-100 transition-all duration-500" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-['Plus_Jakarta_Sans'] font-medium text-[11px]">首页</span>
</a>
<a class="flex flex-col items-center justify-center text-blue-600 dark:text-blue-400 scale-110 font-bold animate-bounce-subtle active:scale-90 transition-all duration-500" href="#">
<span class="material-symbols-outlined" data-icon="bar_chart" data-weight="fill" style="font-variation-settings: 'FILL' 1;">bar_chart</span>
<span class="font-['Plus_Jakarta_Sans'] font-medium text-[11px]">统计</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 opacity-80 hover:opacity-100 transition-all duration-500" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-['Plus_Jakarta_Sans'] font-medium text-[11px]">我的</span>
</a>
</nav>
<!-- FAB for quick action (Contextual) -->
<button class="fixed right-6 bottom-32 w-14 h-14 vibrant-gradient rounded-full flex items-center justify-center text-white shadow-[0_8px_25px_rgba(0,112,235,0.4)] active:scale-90 transition-all duration-300">
<span class="material-symbols-outlined" data-icon="add">add</span>
</button>
